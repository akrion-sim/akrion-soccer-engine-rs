# Nightly 128-team soccer LEARNING tournament.
#
# Runs once a night, 2:00am America/Chicago, and must finish well before 7am. The
# default bracket is ~256 matches whose critical path is only ~10 "waves", so the
# job is compute-bound, not deadline-bound: `main_soccer_tournament_run` plays many
# matches in parallel (SOCCER_TOURNAMENT_PARALLELISM), warm-starts each team's brain
# from the previous night's result in Postgres, and persists the evolved brains +
# full bracket back (des_soccer_tournaments / _matches / _team_brains).
#
# Unlike the continuous self-play Deployment, this is a CronJob: one run per night,
# Forbid overlap, and a hard activeDeadline a little under 5 hours. The app stops
# itself ~5min before that (SOCCER_TOURNAMENT_DEADLINE_SECONDS) so it flushes
# Postgres instead of being SIGKILLed mid-write.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dd-soccer-learning-tournament
  namespace: default
  labels:
    app: dd-soccer-learning-tournament
    app.kubernetes.io/name: dd-soccer-learning-tournament
    app.kubernetes.io/part-of: des-soccer-learning
spec:
  schedule: "0 2 * * *"
  timeZone: America/Chicago        # field (not hardcoded UTC) so DST never drifts the start
  concurrencyPolicy: Forbid        # never overlap nights
  startingDeadlineSeconds: 1800    # if the controller was down at 2am, still start within 30m
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      activeDeadlineSeconds: 17400  # 4h50m hard cap (2:00 -> ~6:50 Central), well before 7am
      backoffLimit: 0              # a missed night is fine; don't thrash retries
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: dd-soccer-learning-tournament
            app.kubernetes.io/name: dd-soccer-learning-tournament
            app.kubernetes.io/part-of: des-soccer-learning
        spec:
          serviceAccountName: dd-remote-rest-api
          automountServiceAccountToken: true
          restartPolicy: Never
          terminationGracePeriodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: soccer-tournament
              image: docker.io/library/rust:1.90-bookworm
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -lc
              args:
                - |
                  set -euo pipefail
                  export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

                  # main_soccer_tournament_run lives in the soccer_engine repo and
                  # depends on discrete-event-system.rs as a SIBLING (its
                  # `des_engine = { path = "../discrete-event-system.rs" }`), so clone
                  # both into a common parent. The /tmp build cache (hostPath) is
                  # reused night-to-night, turning the cold clone+rebuild into a fast
                  # incremental one and avoiding a rustc cold-start CPU stampede.
                  run_prefix="${SOCCER_TOURNAMENT_RUN_PREFIX:-dd-soccer-tournament}"
                  soccer_repo="${SOCCER_SOURCE_REPO:-https://github.com/ORESoftware/soccer-sim-game-engine.rs.git}"
                  soccer_ref="${SOCCER_SOURCE_REF:-main}"
                  des_repo="${SOCCER_DES_REPO:-https://github.com/ORESoftware/discrete-event-system.rs.git}"
                  des_ref="${SOCCER_DES_REF:-main}"
                  parent="/tmp/${run_prefix}-src"
                  soccer_dir="${parent}/soccer-sim-game-engine.rs"
                  des_dir="${parent}/discrete-event-system.rs"
                  export CARGO_TARGET_DIR="/tmp/${run_prefix}-target"

                  checkout_repo() {
                    dir="$1"; repo="$2"; ref="$3"
                    if [ -d "${dir}/.git" ]; then
                      git -C "${dir}" fetch --depth 1 origin "${ref}"
                      git -C "${dir}" checkout --force FETCH_HEAD
                    else
                      rm -rf "${dir}"
                      git clone --depth 1 --branch "${ref}" "${repo}" "${dir}"
                    fi
                  }

                  mkdir -p "${parent}"
                  checkout_repo "${des_dir}" "${des_repo}" "${des_ref}"
                  checkout_repo "${soccer_dir}" "${soccer_repo}" "${soccer_ref}"
                  cd "${soccer_dir}"
                  echo "tournament_build soccer=$(git rev-parse HEAD) des=$(git -C "${des_dir}" rev-parse HEAD)"

                  /usr/local/cargo/bin/cargo build --release --bin main_soccer_tournament_run
                  exec "${CARGO_TARGET_DIR}/release/main_soccer_tournament_run"
              env:
                - name: HOME
                  value: /tmp
                - name: CARGO_HOME
                  value: /tmp/cargo
                - name: CARGO_BUILD_JOBS
                  value: "8"
                - name: CARGO_NET_RETRY
                  value: "5"
                - name: RUST_BACKTRACE
                  value: "1"
                # --- engine source (cloned as siblings) ---
                - name: SOCCER_SOURCE_REPO
                  value: https://github.com/ORESoftware/soccer-sim-game-engine.rs.git
                - name: SOCCER_SOURCE_REF
                  value: main
                - name: SOCCER_DES_REPO
                  value: https://github.com/ORESoftware/discrete-event-system.rs.git
                - name: SOCCER_DES_REF
                  value: main
                # --- Postgres (warm-start brains + persist results) ---
                - name: SOCCER_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: dd-remote-rest-api-secrets
                      key: RDS_DATABASE_URL
                - name: SOCCER_TOURNAMENT_EXPERIMENT
                  value: nightly-soccer-tournament
                # --- tournament shape + learning ---
                - name: SOCCER_TOURNAMENT_TEAMS
                  value: "128"
                - name: SOCCER_TOURNAMENT_GROUP_SIZE
                  value: "4"
                - name: SOCCER_TOURNAMENT_ADVANCERS
                  value: "2"
                - name: SOCCER_TOURNAMENT_THIRD_PLACE
                  value: "true"
                - name: SOCCER_TOURNAMENT_MODE
                  value: bilearning
                - name: SOCCER_TOURNAMENT_MATCH_SECONDS
                  value: "120"
                # Parallel matches. Each match is an independent in-pod SoccerMatch
                # (inline neural, deterministic); keep this within the pod's CPU/mem.
                - name: SOCCER_TOURNAMENT_PARALLELISM
                  value: "8"
                # Graceful stop ~4h45m in — before activeDeadlineSeconds (4h50m) so
                # the process flushes Postgres instead of being SIGKILLed.
                - name: SOCCER_TOURNAMENT_DEADLINE_SECONDS
                  value: "17100"
              resources:
                requests:
                  cpu: "4"
                  memory: 8Gi
                limits:
                  cpu: "16"
                  memory: 48Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            # Persist the build cache (git checkouts + cargo registry + target) on
            # the node so each night's build is incremental. DirectoryOrCreate keeps
            # it portable across clusters (the dir need not pre-exist on the node).
            - name: tmp
              hostPath:
                path: /var/cache/dd-soccer-tournament
                type: DirectoryOrCreate
