apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-soccer-learning-rds-continuous
  namespace: default
  labels:
    app: dd-soccer-learning-rds-continuous
    app.kubernetes.io/name: dd-soccer-learning-rds-continuous
    app.kubernetes.io/part-of: des-soccer-learning
spec:
  replicas: 1
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 1200
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-soccer-learning-rds-continuous
  template:
    metadata:
      labels:
        app: dd-soccer-learning-rds-continuous
        app.kubernetes.io/name: dd-soccer-learning-rds-continuous
        app.kubernetes.io/part-of: des-soccer-learning
    spec:
      serviceAccountName: dd-remote-rest-api
      automountServiceAccountToken: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: soccer-learning
          image: docker.io/library/rust:1.90-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

              run_prefix="${SOCCER_RUN_ID_PREFIX:-codex-soccer-learning-continuous}"
              source_repo="${SOCCER_SOURCE_REPO:-https://github.com/akrion-sim/akrion-soccer-engine-rs.git}"
              engine_repo="${SOCCER_ENGINE_SOURCE_REPO:-https://github.com/ORESoftware/discrete-event-system.rs.git}"
              source_ref="${SOCCER_SOURCE_REF:-learning}"
              engine_ref="${SOCCER_ENGINE_SOURCE_REF:-main}"
              base="/tmp/${run_prefix}-src"
              if [ -d "${base}/.git" ]; then
                base="${base}-$(date -u +%Y%m%dT%H%M%SZ)"
              fi
              soccer="${base}/soccer-sim-game-engine.rs"
              engine="${base}/discrete-event-system.rs"
              target="/tmp/${run_prefix}-target"
              ready_file="/tmp/${run_prefix}-ready-${HOSTNAME:-pod}"
              export CARGO_TARGET_DIR="${target}"

              sync_ref() {
                repo="$1"; ref="$2"; dir="$3"
                if [ -d "${dir}/.git" ]; then
                  echo "source_checkout_mode=fetch dir=${dir} ref=${ref}"
                  git -C "${dir}" fetch --depth 1 origin "${ref}"
                  git -C "${dir}" switch --detach FETCH_HEAD
                else
                  echo "source_checkout_mode=clone dir=${dir} ref=${ref}"
                  git clone --depth 1 --filter=blob:none --no-checkout "${repo}" "${dir}"
                  git -C "${dir}" fetch --depth 1 origin "${ref}"
                  git -C "${dir}" switch --detach FETCH_HEAD
                fi
              }

              require_value() {
                name="$1"
                expected="$2"
                actual="${!name:-}"
                if [ "${actual}" != "${expected}" ]; then
                  echo "continuous_config_invalid ${name}=${actual:-unset} expected=${expected}" >&2
                  exit 78
                fi
              }

              require_value SOCCER_REQUIRE_POSTGRES true
              require_value SOCCER_NEURAL_LEARNING_ENABLED true
              require_value SOCCER_NEURAL_LEARNING_BACKEND threaded
              require_value SOCCER_PARALLEL_GAMES 1
              require_value SOCCER_POSTGRES_POLICY_VERSION_INTERVAL_GAMES 1
              require_value SOCCER_POSTGRES_COMPLETED_RUN_BATCH_GAMES 1
              require_value SOCCER_POSTGRES_TACTICAL_LEARNING_AUTHORITATIVE true
              require_value SOCCER_POSTGRES_REFRESH_WITH_RESUME_ARTIFACT true
              require_value SOCCER_POSTGRES_FLUSH_POLICY_VERSIONS_BEFORE_NEW_SIM true
              require_value SOCCER_EVOLUTION_ENABLED true
              require_value SOCCER_EVOLUTION_INTERVAL_GAMES 5
              require_value DD_SOCCER_ENABLE_LOOSE_BALL_COMMIT_MODEL true
              require_value DD_SOCCER_ENABLE_LEARNED_SPACING_TARGET true
              require_value DD_SOCCER_ENABLE_LEARNED_MPC_OBJECTIVE true
              require_value DD_SOCCER_ENABLE_CHANCE_QUALITY_REWARD true
              require_value DD_SOCCER_ENABLE_LEARNED_PASS_RECEIVER true
              require_value DD_SOCCER_ENABLE_NEURAL_PASS_SPACE true
              require_value DD_SOCCER_ENABLE_DISCRETIZED_KICK false
              require_value DD_SOCCER_ENABLE_SCORED_SHOT_PLACEMENT true
              require_value DD_SOCCER_ENABLE_TARGET_STANDARDIZATION true
              require_value DD_SOCCER_ENABLE_DP_BOOTSTRAP true
              require_value DD_SOCCER_ENABLE_DP_CRITIC_TARGET true
              require_value DD_SOCCER_DP_BOOTSTRAP_HORIZON 64
              require_value DD_SOCCER_DP_BOOTSTRAP_SWEEPS 200
              require_value SOCCER_APPROX_DP_REPLAY_PASSES 8
              require_value SOCCER_APPROX_DP_POLICY_PRIOR_WEIGHT 0.5
              require_value DD_SOCCER_ENABLE_MC_CRITIC_TARGET true
              require_value DD_SOCCER_ENABLE_NEURAL_SELF_BOOTSTRAP true
              require_value DD_SOCCER_ENABLE_MAXA_BOOTSTRAP true
              require_value DD_SOCCER_ENABLE_NOVELTY_BONUS true
              require_value DD_SOCCER_ENABLE_SPECIALIST_CURRICULUM true
              require_value DD_SOCCER_FORWARD_PASS_CLIMB_CURRICULUM true
              require_value DD_SOCCER_ENABLE_DEFERRED_PASS_CREDIT true
              require_value DD_SOCCER_QUICK_FORWARD_RELEASE_REWARD_SCALE 1.0
              require_value SOCCER_NEURAL_TARGET_SCALE 30
              require_value SOCCER_NEURAL_TARGET_CLIP 15
              require_value SOCCER_NEURAL_TARGET_POPART true
              require_value SOCCER_NEURAL_ACTOR_CRITIC true
              require_value SOCCER_ENABLE_ACTOR_CRITIC true
              require_value SOCCER_NEURAL_LP_COUPLING_ENABLED true
              require_value SOCCER_NEURAL_MCTS_ENABLED false
              require_value SOCCER_NEURAL_MCTS_CANDIDATES 8
              require_value SOCCER_NEURAL_MCTS_PASS_TARGET_CANDIDATES 8
              require_value DD_SOCCER_ENABLE_KEEPER_POLICY_HEAD true
              require_value DD_SOCCER_ENABLE_SKILL_POLICY_HEADS true
              require_value DD_SOCCER_FORWARD_PASS_REWARD_SCALE 6
              require_value DD_SOCCER_SHOT_SHAPING_REWARD_SCALE 0.4
              require_value SOCCER_EVAL_REQUIRE_FORWARD_PASS_CLIMB true
              require_value SOCCER_EVAL_MIN_FORWARD_PASS_MARGIN 0
              require_value SOCCER_EVAL_MIN_NET_FORWARD_PASS_MARGIN 0
              require_value SOCCER_EVAL_MIN_FORWARD_PASS_RATE_MARGIN 0.0
              require_value SOCCER_NEURAL_POPULATION_REQUIRE_FORWARD_PASS_CLIMB true
              require_value SOCCER_NEURAL_POPULATION_MIN_FORWARD_PASS_MARGIN 0
              require_value SOCCER_NEURAL_POPULATION_MIN_NET_FORWARD_PASS_MARGIN 0
              require_value SOCCER_NEURAL_POPULATION_MIN_FORWARD_PASS_RATE_MARGIN 0.0
              require_value SOCCER_LEARNING_ANALYTIC_OPPONENT true
              require_value SOCCER_LEAGUE_ANALYTIC_OPPONENTS true
              require_value SOCCER_ANCHOR_PROMOTION_GATE_ENABLED true
              require_value DD_SOCCER_ENABLE_LEARNED_EPV true

              echo "continuous_started_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "postgres_required=${SOCCER_REQUIRE_POSTGRES}"
              echo "games_per_cycle=${SOCCER_GAMES}"
              echo "parallel_games=${SOCCER_PARALLEL_GAMES}"
              echo "dt_seconds=${SOCCER_DT_SECONDS}"
              echo "neural_learning=${SOCCER_NEURAL_LEARNING_ENABLED}"
              echo "neural_backend=${SOCCER_NEURAL_LEARNING_BACKEND}"
              echo "policy_version_interval=${SOCCER_POSTGRES_POLICY_VERSION_INTERVAL_GAMES}"
              echo "completed_batch_games=${SOCCER_POSTGRES_COMPLETED_RUN_BATCH_GAMES}"
              echo "flush_before_new_sim=${SOCCER_POSTGRES_FLUSH_POLICY_VERSIONS_BEFORE_NEW_SIM}"
              echo "refresh_with_resume=${SOCCER_POSTGRES_REFRESH_WITH_RESUME_ARTIFACT}"
              echo "learned_mpc_objective=${DD_SOCCER_ENABLE_LEARNED_MPC_OBJECTIVE}"
              echo "chance_quality_reward=${DD_SOCCER_ENABLE_CHANCE_QUALITY_REWARD}"
              echo "learned_pass_receiver=${DD_SOCCER_ENABLE_LEARNED_PASS_RECEIVER}"
              echo "neural_pass_space=${DD_SOCCER_ENABLE_NEURAL_PASS_SPACE}"
              echo "discretized_kick=${DD_SOCCER_ENABLE_DISCRETIZED_KICK}"
              echo "scored_shot_placement=${DD_SOCCER_ENABLE_SCORED_SHOT_PLACEMENT}"
              echo "target_standardization=${DD_SOCCER_ENABLE_TARGET_STANDARDIZATION}"
              echo "dp_bootstrap=${DD_SOCCER_ENABLE_DP_BOOTSTRAP}"
              echo "dp_critic_target=${DD_SOCCER_ENABLE_DP_CRITIC_TARGET}"
              echo "dp_bootstrap_horizon=${DD_SOCCER_DP_BOOTSTRAP_HORIZON}"
              echo "dp_bootstrap_sweeps=${DD_SOCCER_DP_BOOTSTRAP_SWEEPS}"
              echo "approx_dp_replay_passes=${SOCCER_APPROX_DP_REPLAY_PASSES}"
              echo "approx_dp_policy_prior_weight=${SOCCER_APPROX_DP_POLICY_PRIOR_WEIGHT}"
              echo "mc_critic_target=${DD_SOCCER_ENABLE_MC_CRITIC_TARGET}"
              echo "neural_self_bootstrap=${DD_SOCCER_ENABLE_NEURAL_SELF_BOOTSTRAP}"
              echo "maxa_bootstrap=${DD_SOCCER_ENABLE_MAXA_BOOTSTRAP}"
              echo "novelty_bonus=${DD_SOCCER_ENABLE_NOVELTY_BONUS}"
              echo "specialist_curriculum=${DD_SOCCER_ENABLE_SPECIALIST_CURRICULUM}"
              echo "forward_pass_climb_curriculum=${DD_SOCCER_FORWARD_PASS_CLIMB_CURRICULUM}"
              echo "deferred_pass_credit=${DD_SOCCER_ENABLE_DEFERRED_PASS_CREDIT}"
              echo "quick_forward_release_reward_scale=${DD_SOCCER_QUICK_FORWARD_RELEASE_REWARD_SCALE}"
              echo "neural_target_scale=${SOCCER_NEURAL_TARGET_SCALE}"
              echo "neural_target_clip=${SOCCER_NEURAL_TARGET_CLIP}"
              echo "neural_target_popart=${SOCCER_NEURAL_TARGET_POPART}"
              echo "actor_critic=${SOCCER_NEURAL_ACTOR_CRITIC}"
              echo "actor_critic_legacy=${SOCCER_ENABLE_ACTOR_CRITIC}"
              echo "lp_coupling=${SOCCER_NEURAL_LP_COUPLING_ENABLED}"
              echo "neural_mcts=${SOCCER_NEURAL_MCTS_ENABLED}"
              echo "neural_mcts_candidates=${SOCCER_NEURAL_MCTS_CANDIDATES}"
              echo "neural_mcts_pass_target_candidates=${SOCCER_NEURAL_MCTS_PASS_TARGET_CANDIDATES}"
              echo "keeper_policy_head=${DD_SOCCER_ENABLE_KEEPER_POLICY_HEAD}"
              echo "skill_policy_heads=${DD_SOCCER_ENABLE_SKILL_POLICY_HEADS}"
              echo "forward_pass_reward_scale=${DD_SOCCER_FORWARD_PASS_REWARD_SCALE}"
              echo "shot_shaping_reward_scale=${DD_SOCCER_SHOT_SHAPING_REWARD_SCALE}"
              echo "eval_forward_pass_climb=${SOCCER_EVAL_REQUIRE_FORWARD_PASS_CLIMB}"
              echo "eval_forward_pass_margin=${SOCCER_EVAL_MIN_FORWARD_PASS_MARGIN}"
              echo "eval_net_forward_pass_margin=${SOCCER_EVAL_MIN_NET_FORWARD_PASS_MARGIN}"
              echo "eval_forward_pass_rate_margin=${SOCCER_EVAL_MIN_FORWARD_PASS_RATE_MARGIN}"
              echo "population_forward_pass_climb=${SOCCER_NEURAL_POPULATION_REQUIRE_FORWARD_PASS_CLIMB}"
              echo "population_forward_pass_margin=${SOCCER_NEURAL_POPULATION_MIN_FORWARD_PASS_MARGIN}"
              echo "population_net_forward_pass_margin=${SOCCER_NEURAL_POPULATION_MIN_NET_FORWARD_PASS_MARGIN}"
              echo "population_forward_pass_rate_margin=${SOCCER_NEURAL_POPULATION_MIN_FORWARD_PASS_RATE_MARGIN}"
              echo "learning_analytic_opponent=${SOCCER_LEARNING_ANALYTIC_OPPONENT}"
              echo "league_analytic_opponents=${SOCCER_LEAGUE_ANALYTIC_OPPONENTS}"
              echo "anchor_promotion_gate=${SOCCER_ANCHOR_PROMOTION_GATE_ENABLED}"
              echo "learned_epv=${DD_SOCCER_ENABLE_LEARNED_EPV}"
              echo "learned_epv_grid_path=${DD_SOCCER_LEARNED_EPV_GRID_PATH:-unset}"
              echo "source_ref=${source_ref}"
              echo "engine_ref=${engine_ref}"

              mkdir -p "${base}"
              sync_ref "${engine_repo}" "${engine_ref}" "${engine}"
              sync_ref "${source_repo}" "${source_ref}" "${soccer}"

              cd "${soccer}"
              # Turn ON every DD_SOCCER_* feature gate for this (separate) experiment
              # lineage — kitchen-sink all-on training. Guarded so a checkout WITHOUT the
              # script is a harmless no-op (the gates just stay default-off). The unknown
              # new-gate vars are no-ops on older builds. See scripts/all-gates-on.sh for
              # the retrain / serving-must-match caveats.
              if [ -f scripts/all-gates-on.sh ]; then
                # shellcheck disable=SC1091
                source scripts/all-gates-on.sh
              fi
              # The deferred-credit climb lineage is not a blind all-gates run: keep the
              # confirmed target window and non-discretized kick interface after the helper.
              export DD_SOCCER_ENABLE_DISCRETIZED_KICK=false
              export DD_SOCCER_ENABLE_CHANCE_QUALITY_REWARD=true
              export DD_SOCCER_ENABLE_SPECIALIST_CURRICULUM=true
              export DD_SOCCER_ENABLE_KEEPER_POLICY_HEAD=true
              export DD_SOCCER_ENABLE_SKILL_POLICY_HEADS=true
              export SOCCER_NEURAL_TARGET_SCALE=30
              export SOCCER_NEURAL_TARGET_CLIP=15
              export SOCCER_NEURAL_TARGET_POPART=true
              export DD_SOCCER_ENABLE_DP_BOOTSTRAP=true
              export DD_SOCCER_ENABLE_DP_CRITIC_TARGET=true
              export DD_SOCCER_DP_BOOTSTRAP_HORIZON=64
              export DD_SOCCER_DP_BOOTSTRAP_SWEEPS=200
              export SOCCER_APPROX_DP_REPLAY_PASSES=8
              export SOCCER_APPROX_DP_POLICY_PRIOR_WEIGHT=0.5
              # Move 1a: learned EPV potential — swap the hand-built xT seed inside the
              # PBRS territorial reward with a fitted-from-outcomes EPV grid. The grid is
              # committed to scripts/epv_grid.json and copied to a stable path here.
              export DD_SOCCER_ENABLE_LEARNED_EPV=true
              if [ -f scripts/epv_grid.json ]; then
                cp scripts/epv_grid.json /tmp/epv_grid.json
                export DD_SOCCER_LEARNED_EPV_GRID_PATH=/tmp/epv_grid.json
              fi
              echo "deferred_credit_stack_final discretized_kick=${DD_SOCCER_ENABLE_DISCRETIZED_KICK} chance_quality_reward=${DD_SOCCER_ENABLE_CHANCE_QUALITY_REWARD} specialist_curriculum=${DD_SOCCER_ENABLE_SPECIALIST_CURRICULUM} keeper_policy_head=${DD_SOCCER_ENABLE_KEEPER_POLICY_HEAD} skill_policy_heads=${DD_SOCCER_ENABLE_SKILL_POLICY_HEADS} target_scale=${SOCCER_NEURAL_TARGET_SCALE} target_clip=${SOCCER_NEURAL_TARGET_CLIP} target_popart=${SOCCER_NEURAL_TARGET_POPART} dp_bootstrap=${DD_SOCCER_ENABLE_DP_BOOTSTRAP} dp_critic_target=${DD_SOCCER_ENABLE_DP_CRITIC_TARGET} dp_horizon=${DD_SOCCER_DP_BOOTSTRAP_HORIZON} dp_sweeps=${DD_SOCCER_DP_BOOTSTRAP_SWEEPS} approx_dp_replay_passes=${SOCCER_APPROX_DP_REPLAY_PASSES} approx_dp_policy_prior_weight=${SOCCER_APPROX_DP_POLICY_PRIOR_WEIGHT} learned_epv=${DD_SOCCER_ENABLE_LEARNED_EPV}"
              actual_commit="$(git rev-parse HEAD)"
              engine_commit="$(git -C "${engine}" rev-parse HEAD)"
              echo "source_commit_actual=${actual_commit}"
              echo "engine_commit_actual=${engine_commit}"
              export SOCCER_SOURCE_COMMIT="${actual_commit}"

              /usr/local/cargo/bin/cargo build --release --features postgres-persistence --bin main_soccer_learning_run
              touch "${ready_file}"

              cycle=0
              seed_base="${SOCCER_SEED_BASE:-2026}"
              seed_stride="${SOCCER_SEED_STRIDE:-1000}"
              evolution_seed_base="${SOCCER_EVOLUTION_SEED_BASE:-20260607}"
              while true; do
                cycle="$((cycle + 1))"
                stamp="$(date -u +%Y%m%dT%H%M%SZ)"
                export SOCCER_SEED="$((seed_base + cycle * seed_stride))"
                export SOCCER_EVOLUTION_SEED="$((evolution_seed_base + cycle))"
                export SOCCER_RUN_ID="${run_prefix}-${stamp}-c${cycle}"
                export SOCCER_RUN_DIR="/tmp/${SOCCER_RUN_ID}"
                echo "continuous_cycle_start cycle=${cycle} run_id=${SOCCER_RUN_ID} seed=${SOCCER_SEED} evolution_seed=${SOCCER_EVOLUTION_SEED} started_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                if "${target}/release/main_soccer_learning_run"; then
                  echo "continuous_cycle_complete cycle=${cycle} run_id=${SOCCER_RUN_ID} finished_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  sleep "${SOCCER_CYCLE_SLEEP_SECONDS:-30}"
                else
                  status="$?"
                  echo "continuous_cycle_failed cycle=${cycle} run_id=${SOCCER_RUN_ID} status=${status} failed_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >&2
                  sleep "${SOCCER_FAILURE_SLEEP_SECONDS:-300}"
                fi
              done
          env:
            - name: HOME
              value: /tmp
            - name: CARGO_HOME
              value: /tmp/cargo
            - name: CARGO_BUILD_JOBS
              value: "4"
            - name: CARGO_NET_RETRY
              value: "5"
            - name: RUST_BACKTRACE
              value: "1"
            - name: SOCCER_TELEMETRY_ENABLED
              value: "true"
            - name: SOCCER_LOG_JSON
              value: "true"
            - name: SOCCER_RUST_LOG
              value: info,soccer_engine=info
            - name: SOCCER_CLUSTER_NAME
              value: dd-soccer-k8s
            - name: SOCCER_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://dd-soccer-otel-collector.default.svc.cluster.local:4318/v1/traces
            - name: SOCCER_SOURCE_REPO
              value: https://github.com/akrion-sim/akrion-soccer-engine-rs.git
            - name: SOCCER_SOURCE_REF
              value: learning
            - name: SOCCER_ENGINE_SOURCE_REPO
              value: https://github.com/ORESoftware/discrete-event-system.rs.git
            - name: SOCCER_ENGINE_SOURCE_REF
              value: main
            - name: SOCCER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dd-remote-rest-api-secrets
                  key: RDS_DATABASE_URL
            - name: SOCCER_PG_TLS_INSECURE
              value: "1"
            - name: SOCCER_REQUIRE_POSTGRES
              value: "true"
            - name: SOCCER_RUN_ID_PREFIX
              value: codex-soccer-learning-overnight
            - name: SOCCER_SEED_BASE
              value: "2026"
            - name: SOCCER_SEED_STRIDE
              value: "1000"
            - name: SOCCER_EXPERIMENT_SLUG
              value: soccer-self-play-k8s-overnight
            - name: SOCCER_EXPERIMENT_NAME
              value: Soccer self-play k8s overnight evolutionary learning
            - name: SOCCER_GAMES
              value: "8"
            - name: SOCCER_CYCLE_SLEEP_SECONDS
              value: "1"
            - name: SOCCER_PARALLEL_GAMES
              value: "1"
            - name: SOCCER_HALVES
              value: "2"
            - name: SOCCER_HALF_MINUTES
              value: "6"
            - name: SOCCER_MINUTES
              value: "12"
            - name: SOCCER_PERIOD_BREAK_RECOVERY_SECONDS
              value: "900"
            - name: SOCCER_DT_SECONDS
              value: "0.2"
            - name: SOCCER_LEARNING_INTERVAL_TICKS
              value: "1"
            - name: SOCCER_NEURAL_LEARNING_ENABLED
              value: "true"
            - name: SOCCER_NEURAL_LEARNING_BACKEND
              value: threaded
            - name: SOCCER_NEURAL_LEARNING_RATE
              value: "0.035"
            - name: SOCCER_NEURAL_BATCH_SIZE
              value: "64"
            - name: SOCCER_NEURAL_TRAIN_EVERY_TICKS
              value: "1"
            - name: SOCCER_NEURAL_MAX_BATCHES_PER_TICK
              value: "6"
            - name: SOCCER_NEURAL_REPLAY_CAPACITY
              value: "8192"
            - name: SOCCER_NEURAL_REPLAY_SAMPLES_PER_TICK
              value: "128"
            - name: SOCCER_NEURAL_MAX_PENDING_BATCHES
              value: "128"
            - name: SOCCER_NEURAL_TARGET_SCALE
              value: "30"
            - name: SOCCER_NEURAL_TARGET_CLIP
              value: "15"
            - name: SOCCER_NEURAL_TARGET_POPART
              value: "true"
            - name: DD_SOCCER_ENABLE_DP_BOOTSTRAP
              value: "true"
            - name: DD_SOCCER_ENABLE_DP_CRITIC_TARGET
              value: "true"
            - name: DD_SOCCER_DP_BOOTSTRAP_HORIZON
              value: "64"
            - name: DD_SOCCER_DP_BOOTSTRAP_SWEEPS
              value: "200"
            - name: SOCCER_APPROX_DP_REPLAY_PASSES
              value: "8"
            - name: SOCCER_APPROX_DP_POLICY_PRIOR_WEIGHT
              value: "0.5"
            - name: SOCCER_NEURAL_SNAPSHOT_EVERY_BATCHES
              value: "8"
            - name: SOCCER_NEURAL_DRAIN_TIMEOUT_MS
              value: "60000"
            - name: SOCCER_POSTGRES_POLICY_VERSION_INTERVAL_GAMES
              value: "1"
            - name: SOCCER_POSTGRES_COMPLETED_RUN_BATCH_GAMES
              value: "1"
            - name: SOCCER_POSTGRES_COMPLETED_RUN_RETENTION_GAMES
              value: "500"
            - name: SOCCER_POSTGRES_ASYNC_BATCH_QUEUE
              value: "1"
            - name: SOCCER_POSTGRES_ASYNC_COALESCE_BATCHES
              value: "1"
            - name: SOCCER_POSTGRES_ASYNC_COALESCE_WAIT_MS
              value: "50"
            - name: SOCCER_POSTGRES_TACTICAL_LEARNING_AUTHORITATIVE
              value: "true"
            - name: SOCCER_POSTGRES_REFRESH_WITH_RESUME_ARTIFACT
              value: "true"
            - name: SOCCER_POSTGRES_FLUSH_POLICY_VERSIONS_BEFORE_NEW_SIM
              value: "true"
            - name: SOCCER_EVOLUTION_ENABLED
              value: "true"
            - name: SOCCER_EVOLUTION_INTERVAL_GAMES
              value: "5"
            - name: SOCCER_EVOLUTION_ELITE_GAMES
              value: "5"
            - name: SOCCER_EVOLUTION_WINDOW_GAMES
              value: "25"
            - name: SOCCER_EVOLUTION_MUTATION_RATE
              value: "0.08"
            - name: SOCCER_EVOLUTION_MUTATION_SCALE
              value: "0.34"
            - name: SOCCER_EVOLUTION_CROSSOVER_RATE
              value: "0.62"
            - name: SOCCER_EVOLUTION_EXPLORATION_RATE
              value: "0.14"
            - name: SOCCER_EVOLUTION_EXPLORATION_SCALE
              value: "0.90"
            - name: SOCCER_EVOLUTION_ELITE_WEIGHT_FLOOR
              value: "0.08"
            - name: SOCCER_EVOLUTION_POPULATION_SIZE
              value: "16"
            - name: SOCCER_EVOLUTION_SEED_BASE
              value: "20260608"
            - name: SOCCER_MAX_POLICY_ENTRIES_PER_TEAM
              value: "120000"
            - name: SOCCER_MAX_POLICY_TARGET_ENTRIES_PER_TEAM
              value: "120000"
            - name: SOCCER_MIN_POLICY_VISITS
              value: "1"
            - name: SOCCER_GAME_ARTIFACT_MODE
              value: summary
            - name: SOCCER_WRITE_GAME_ARTIFACTS
              value: "false"
            - name: SOCCER_WRITE_FINAL_ARTIFACTS
              value: "false"
            - name: SOCCER_WRITE_FINAL_POLICY_ARTIFACT
              value: "false"
            - name: SOCCER_WRITE_CHECKPOINT_ARTIFACTS
              value: "false"
