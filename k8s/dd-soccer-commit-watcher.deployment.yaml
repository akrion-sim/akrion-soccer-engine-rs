apiVersion: v1
kind: ServiceAccount
metadata:
  name: dd-soccer-commit-watcher
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dd-soccer-commit-watcher
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dd-soccer-commit-watcher
  namespace: default
subjects:
  - kind: ServiceAccount
    name: dd-soccer-commit-watcher
    namespace: default
roleRef:
  kind: Role
  name: dd-soccer-commit-watcher
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dd-soccer-commit-watcher
  namespace: default
  labels:
    app: dd-soccer-commit-watcher
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dd-soccer-commit-watcher
  template:
    metadata:
      labels:
        app: dd-soccer-commit-watcher
    spec:
      serviceAccountName: dd-soccer-commit-watcher
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: watcher
          image: docker.io/library/rust:1.90-bookworm
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -u
              KCTL=/tmp/kubectl
              SOCCER_REPO="https://github.com/ORESoftware/soccer-sim-game-engine.rs.git"
              DES_REPO="https://github.com/ORESoftware/discrete-event-system.rs.git"
              NS=default
              CM=dd-soccer-commit-watcher-state
              LEARNER=deployment/dd-soccer-learning-rds-continuous
              CRON=cronjob/dd-soccer-tournament-nightly
              POLL="${WATCH_POLL_SECONDS:-120}"
              # install kubectl once (no per-poll download)
              if [ ! -x "$KCTL" ]; then
                V="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
                curl -fsSL -o "$KCTL" "https://dl.k8s.io/release/${V}/bin/linux/amd64/kubectl"
                chmod +x "$KCTL"
              fi

              resolve_sha() {
                repo="$1"
                git ls-remote "$repo" refs/heads/main 2>/dev/null | awk '{print $1}' | head -1
              }

              state_value() {
                key="$1"
                $KCTL -n $NS get cm $CM -o "jsonpath={.data.${key}}" 2>/dev/null || true
              }

              write_state() {
                key="$1"
                soccer_sha="$2"
                des_sha="$3"
                tournament_job="${4:-}"
                $KCTL -n $NS create cm $CM \
                  --from-literal=lastKey="$key" \
                  --from-literal=lastSoccerSha="$soccer_sha" \
                  --from-literal=lastDesSha="$des_sha" \
                  --from-literal=lastSha="$soccer_sha" \
                  --from-literal=lastTournamentJob="$tournament_job" \
                  --dry-run=client -o yaml | $KCTL -n $NS apply -f -
              }

              LAST_KEY="$(state_value lastKey)"
              LEGACY_LAST_SOCCER="$(state_value lastSha)"
              echo "commit-watcher up: soccer_repo=$SOCCER_REPO des_repo=$DES_REPO poll=${POLL}s kubectl=$($KCTL version --client -o yaml 2>/dev/null | grep gitVersion | head -1)"
              echo "seed lastKey=${LAST_KEY:-<none>} legacyLastSoccer=${LEGACY_LAST_SOCCER:-<none>}"
              while true; do
                SOCCER_SHA="$(resolve_sha "$SOCCER_REPO")"
                DES_SHA="$(resolve_sha "$DES_REPO")"
                if [ -z "$SOCCER_SHA" ] || [ -z "$DES_SHA" ]; then
                  echo "$(date -u +%FT%TZ) WARN unable to resolve refs soccer=${SOCCER_SHA:-<empty>} des=${DES_SHA:-<empty>}"
                  sleep "$POLL"
                  continue
                fi

                KEY="${SOCCER_SHA}:${DES_SHA}"
                if [ -z "$LAST_KEY" ]; then
                  if [ -z "$LEGACY_LAST_SOCCER" ] || [ "$LEGACY_LAST_SOCCER" = "$SOCCER_SHA" ]; then
                    echo "$(date -u +%FT%TZ) seed current refs without restart soccer=$SOCCER_SHA des=$DES_SHA"
                    if write_state "$KEY" "$SOCCER_SHA" "$DES_SHA" ""; then
                      LAST_KEY="$KEY"
                    else
                      echo "WARN state seed failed"
                    fi
                    sleep "$POLL"
                    continue
                  fi
                  LAST_KEY="${LEGACY_LAST_SOCCER}:"
                fi

                if [ "$KEY" != "$LAST_KEY" ]; then
                  SHORT="${SOCCER_SHA:0:7}-${DES_SHA:0:7}"
                  JOB="dd-soccer-tournament-push-${SHORT}-$(date +%s)"
                  echo "$(date -u +%FT%TZ) NEW COMMIT soccer=$SOCCER_SHA des=$DES_SHA (was $LAST_KEY) -> redeploy learner + launch tournament job=$JOB"
                  $KCTL -n $NS rollout restart "$LEARNER" || echo "WARN rollout restart failed"
                  $KCTL -n $NS create job "$JOB" --from="$CRON" || echo "WARN tournament job create failed"
                  if write_state "$KEY" "$SOCCER_SHA" "$DES_SHA" "$JOB"; then
                    LAST_KEY="$KEY"
                    echo "$(date -u +%FT%TZ) done; now tracking soccer=$SOCCER_SHA des=$DES_SHA"
                  else
                    echo "WARN state update failed"
                  fi
                fi
                sleep "$POLL"
              done
          resources:
            requests:
              cpu: "20m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
