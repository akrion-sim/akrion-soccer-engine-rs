# Nightly 128-team learning tournament.
#
# Runs `main_soccer_tournament_run` once per night: seeds the entrant field from
# the latest active Postgres policy, plays the full World-Cup-style bracket with
# the real engine (neural-authoritative), and promotes the champion back as the
# new active policy version — so each night builds on the last.
#
# Scheduling contract: START at 2am, run to COMPLETION even if it spills past 7am.
#   * schedule "0 2 * * *" + spec.timeZone (k8s CronJobs are UTC unless timeZone
#     is set; 2am LOCAL requires it).
#   * concurrencyPolicy: Forbid — never overlap two tournaments.
#   * no activeDeadlineSeconds: per owner directive (2026-06-18), the bracket is
#     allowed to run open-ended until the champion and elite pool are persisted.
#   * SOCCER_TOURNAMENT_MATCH_WATCHDOG_SECONDS remains enabled so one stuck
#     fixture can be aborted without imposing an overall tournament deadline.
#   * concurrencyPolicy: Forbid is the overlap guard if a tournament is still
#     running when the next nightly schedule fires.
#
# Runtime budget: the bracket runs independent fixtures in parallel on
# SOCCER_TOURNAMENT_THREADS worker threads. Keep this at 2 by default so AWS EC2
# and Hetzner nodes can run overnight learning without crowding other pods. Results
# are byte-identical to a serial run regardless of thread count (verified by the
# parallel_run_matches_sequential_run_exactly test). With T=2 the 256-match
# World-Cup-style format's critical path is roughly 129 "match-times"; at the
# measured neural-on throughput (~137 engine-ticks/sec, dt=0.2):
#   match_seconds  ticks/match  wall/match  ~129 match-times (T=2)
#      1800 (30m)     9000        ~66s        ~2.4h   <- default
#      3600 (60m)    18000        ~131s       ~4.7h
#      5400 (90m)    27000        ~197s       ~7.1h
# There is intentionally no overall job/app soft cap. Per-fixture watchdogs and
# the global tournament lease still protect the cluster from stuck or duplicate work.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dd-soccer-tournament-nightly
  namespace: default
  labels:
    app: dd-soccer-tournament-nightly
    app.kubernetes.io/name: dd-soccer-tournament-nightly
    app.kubernetes.io/part-of: des-soccer-learning
spec:
  schedule: "0 2 * * *"
  timeZone: America/Chicago
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # No hard stop: the tournament runs open-ended to completion. The per-match
      # watchdog below handles stuck fixtures; concurrencyPolicy: Forbid prevents
      # overlapping nightly tournament jobs.
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: dd-soccer-tournament-nightly
            app.kubernetes.io/name: dd-soccer-tournament-nightly
            app.kubernetes.io/part-of: des-soccer-learning
        spec:
          serviceAccountName: dd-remote-rest-api
          automountServiceAccountToken: true
          restartPolicy: Never
          terminationGracePeriodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: soccer-tournament
              image: docker.io/library/rust:1.90-bookworm
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -lc
              args:
                - |
                  set -euo pipefail
                  export PATH=/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

                  run_prefix="${SOCCER_RUN_ID_PREFIX:-codex-soccer-tournament-nightly}"
                  # `main_soccer_tournament_run` lives in soccer-sim-game-engine.rs, which
                  # depends on discrete-event-system.rs via a `../discrete-event-system.rs`
                  # path dependency — so BOTH repos must be checked out as siblings.
                  soccer_repo="${SOCCER_SOURCE_REPO:-https://github.com/ORESoftware/soccer-sim-game-engine.rs.git}"
                  engine_repo="${SOCCER_ENGINE_SOURCE_REPO:-https://github.com/ORESoftware/discrete-event-system.rs.git}"
                  source_ref="${SOCCER_SOURCE_REF:-main}"
                  engine_ref="${SOCCER_ENGINE_SOURCE_REF:-main}"
                  base="/tmp/${run_prefix}-src"
                  soccer="${base}/soccer-sim-game-engine.rs"
                  engine="${base}/discrete-event-system.rs"
                  target="/tmp/${run_prefix}-target"
                  export CARGO_TARGET_DIR="${target}"

                  checkout() {
                    repo="$1"; ref="$2"; dir="$3"
                    if [ -d "${dir}/.git" ]; then
                      echo "checkout_mode=fetch dir=${dir} ref=${ref}"
                      git -C "${dir}" fetch --depth 1 origin "${ref}"
                      git -C "${dir}" checkout --force FETCH_HEAD
                    else
                      echo "checkout_mode=clone dir=${dir} ref=${ref}"
                      rm -rf "${dir}"
                      git clone --depth 1 --branch "${ref}" "${repo}" "${dir}"
                    fi
                  }

                  mkdir -p "${base}"
                  checkout "${engine_repo}" "${engine_ref}" "${engine}"
                  checkout "${soccer_repo}" "${source_ref}" "${soccer}"

                  cd "${soccer}"
                  echo "soccer_commit=$(git rev-parse HEAD) engine_commit=$(git -C "${engine}" rev-parse HEAD)"
                  echo "tournament_build_started_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  /usr/local/cargo/bin/cargo build --release --features postgres-persistence --bin main_soccer_tournament_run

                  export SOCCER_RUN_ID="${run_prefix}-$(date -u +%Y%m%dT%H%M%SZ)"
                  echo "tournament_run_started_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ) run_id=${SOCCER_RUN_ID}"
                  exec "${target}/release/main_soccer_tournament_run"
              env:
                - name: HOME
                  value: /tmp
                - name: CARGO_HOME
                  value: /tmp/cargo
                - name: CARGO_BUILD_JOBS
                  value: "2"
                - name: CARGO_NET_RETRY
                  value: "5"
                - name: RUST_BACKTRACE
                  value: "1"
                - name: SOCCER_TELEMETRY_ENABLED
                  value: "true"
                - name: SOCCER_LOG_JSON
                  value: "true"
                - name: SOCCER_RUST_LOG
                  value: info,soccer_engine=info
                - name: SOCCER_CLUSTER_NAME
                  value: dd-soccer-k8s
                - name: SOCCER_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
                  value: http://dd-soccer-otel-collector.default.svc.cluster.local:4318/v1/traces
                - name: SOCCER_SOURCE_REPO
                  value: https://github.com/ORESoftware/soccer-sim-game-engine.rs.git
                - name: SOCCER_SOURCE_REF
                  value: main
                - name: SOCCER_ENGINE_SOURCE_REPO
                  value: https://github.com/ORESoftware/discrete-event-system.rs.git
                - name: SOCCER_ENGINE_SOURCE_REF
                  value: main
                - name: SOCCER_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: dd-remote-rest-api-secrets
                      key: RDS_DATABASE_URL
                # RDS presents an Amazon RDS CA cert that isn't in the container's
                # trust store, so a verifying TLS handshake fails with the opaque
                # "error connecting to server". The continuous learner opts out the
                # same way (encrypted but unauthenticated). Without this the nightly
                # job dies at PG connect after 5 retries (verified 2026-06-14).
                - name: SOCCER_PG_TLS_INSECURE
                  value: "1"
                - name: SOCCER_EXPERIMENT_SLUG
                  value: soccer-nightly-tournament
                # Same key in AWS + Hetzner: only one cluster owns the global
                # tournament lease, so total active match workers stay at 2.
                - name: SOCCER_TOURNAMENT_LOCK_KEY
                  value: soccer-nightly-tournament
                # 30-min matches -> ~2.4h at T=2 before clone/build (see header).
                # Halved from 3600 (2026-06-18): the 60-min/128-team bracket needed
                # >8h and was hard-killed at the halfway mark, promoting nothing
                # (DB tournament id=46 stranded at status='running'). A 30-min match
                # still carries ample possessions/goals for the neural value-critic
                # and league-points fitness, and finishes well inside the window so a
                # full champion + top-16 elite pool actually get promoted each night.
                - name: SOCCER_TOURNAMENT_MATCH_SECONDS
                  value: "1800"
                # Per-fixture wall-clock watchdog: abort only the stuck match and
                # keep the bracket moving. Set 0 to disable.
                - name: SOCCER_TOURNAMENT_MATCH_WATCHDOG_SECONDS
                  value: "900"
                # 0 = disabled. There is no overall tournament deadline; per-fixture
                # watchdogs still prevent a single stuck match from pinning the run.
                - name: SOCCER_TOURNAMENT_SOFT_DEADLINE_SECONDS
                  value: "0"
                # Parallel workers - keep == the CPU limit below. Each worker runs one
                # full SoccerMatch at a time.
                - name: SOCCER_TOURNAMENT_THREADS
                  value: "2"
                - name: SOCCER_TOURNAMENT_LEARNING_MODE
                  value: bilearning
                - name: SOCCER_TOURNAMENT_SEED_FRACTION
                  value: "0.5"
                - name: SOCCER_TOURNAMENT_PROMOTE
                  value: "true"
                - name: SOCCER_TOURNAMENT_SEED
                  value: "20260613"
              resources:
                # Low scheduling floor so the job fits on busy nodes in both
                # clusters. The CPU limit enforces the "2 games in parallel max"
                # contract even if the node is otherwise idle.
                requests:
                  # 250m, not a full core: both clusters' single shared node sits near
                  # ~96% CPU *requests* while only ~12% is actually used (pods over-reserve),
                  # so a 1-core request left the pod Pending for hours. The CPU *limit* below
                  # still enforces the 2-games-in-parallel contract; this only lowers the
                  # scheduling reservation so the job fits the real free headroom.
                  cpu: 250m
                  # 8Gi request keeps the pod off the 8Gi Hetzner worker nodes
                  # (dd-k8s-wrk1/2) — it can only land on a 32Gi control-plane node or
                  # the large AWS node, where the higher memory limit below actually fits.
                  memory: 8Gi
                limits:
                  # cpu == SOCCER_TOURNAMENT_THREADS (2). The tournament holds 128
                  # neural brains + up to THREADS concurrent live matches and the
                  # bilearning transition buffers; 12Gi OOMKilled the run ~45min in
                  # (exit 137, verified 2026-06-17 on Hetzner), so raise to 22Gi —
                  # still comfortably under a 32Gi node alongside the control plane.
                  cpu: "2"
                  memory: 22Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            # Per-pod emptyDir, NOT a node hostPath. A hostPath build cache only
            # works on a node where the dir is already owned by uid 1000; on a
            # multi-node cluster (Hetzner: 3 control-plane + 2 workers) the pod can
            # land on a node where /var/cache is fresh + root-owned, and the uid-1000
            # build then dies at `mkdir: Permission denied` before it ever compiles.
            # emptyDir receives the pod's fsGroup (1000) so it is writable on ANY
            # node in ANY cluster, and it drops the restricted-PSA hostPath warning.
            # Trade-off: a cold clone+build every night (~4-5 min) instead of an
            # incremental one — acceptable but not free inside the 5h window that
            # is otherwise ~4.7h of matches.
            - name: tmp
              emptyDir: {}
