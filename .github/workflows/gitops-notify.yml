name: notify Akrion GitOps

on:
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: notify-akrion-gitops-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  dispatch:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.AKRION_GITOPS_TOKEN }}
    steps:
      - name: Dispatch tested revision to GitOps
        run: |
          set -euo pipefail
          test -n "${GH_TOKEN:-}" || {
            echo 'AKRION_GITOPS_TOKEN is not configured.' >&2
            exit 1
          }
          gh api --method POST repos/ORESoftware/k8s-cluster/dispatches \
            -f event_type=akrion-release \
            -f 'client_payload[repository]=${{ github.repository }}' \
            -f 'client_payload[revision]=${{ github.event.workflow_run.head_sha }}'
