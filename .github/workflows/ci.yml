name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# The crate depends on a sibling path crate:
#   des_engine -> ../discrete-event-system.rs (public: ORESoftware/discrete-event-system.rs)
# so it must sit alongside this repo for cargo to resolve it.
#
# NOTE on tests: the full `cargo test` suite is intentionally NOT a CI gate.
# This is a research repo where main carries ~164 known-red behavioral tests
# (assertions pinned to old reward values + parallel-flaky controller/realtime
# tests). Changes are judged locally by diffing the failing SET against the
# baseline, not by counts — see AGENTS.md. CI gates on what is reliable:
# everything compiles, and the hermetic standalone-5v5 suite stays green.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # Actions are pinned to commit SHAs (supply-chain hardening); the trailing
      # comment records the human-readable version.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: akrion-soccer-engine.rs
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ORESoftware/discrete-event-system.rs
          path: discrete-event-system.rs
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: akrion-soccer-engine.rs
      - name: check (lib + bins + tests compile)
        working-directory: akrion-soccer-engine.rs
        run: cargo check --all-targets
      - name: fmt
        working-directory: akrion-soccer-engine.rs
        run: cargo fmt --check
        continue-on-error: true
      - name: clippy
        working-directory: akrion-soccer-engine.rs
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

  # The standalone 5v5 demo is hermetic (zero deps, own [workspace] table), so
  # its suite is fast and reliably green — a real blocking gate.
  standalone-5v5:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: standalone-5v5
      - name: test
        working-directory: standalone-5v5
        run: cargo test
